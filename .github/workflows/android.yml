name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # 1. Gunakan JDK 17 agar Gradle Android tidak error
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. Siapkan lingkungan Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install Cordova CLI secara global
      - name: Install Cordova
        run: npm install -g cordova

      # 4. Susun proyek Cordova dengan urutan yang pas (Anti-Bentrok)
      - name: Prepare Cordova Project
        run: |
          # Buat proyek baru di dalam folder cordova_build
          cordova create cordova_build com.wasender.app WASender
          
          # Kosongkan isi folder www bawaan proyek baru tersebut
          rm -rf cordova_build/www/*
          
          # Salin semua file kamu (index.html, script.js, icon.png, dll) ke folder www
          rsync -av --exclude='cordova_build' --exclude='.git' --exclude='.github' ./ cordova_build/www/
          
          # Pindahkan file config.xml ke posisi luar (folder utama cordova_build) agar dibaca sistem
          mv cordova_build/www/config.xml cordova_build/config.xml || true

      # 5. Proses Compile / Pembuatan APK
      - name: Build Android APK
        run: |
          cd cordova_build
          cordova platform add android
          cordova plugin add cordova-plugin-local-notification
          cordova build android

      # 6. Kirim file APK hasil build agar bisa kamu download
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WASender-APK
          path: cordova_build/platforms/android/app/build/outputs/apk/debug/*.apk
          
