name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project
        run: |
          # 1. Buat project Cordova baru
          cordova create app com.wasender.app WASender
          
          # 2. Kosongkan folder www bawaan Cordova
          rm -rf app/www/*
          
          # 3. Salin semua file utama (index, script, style, icon) tanpa menyalin folder 'app' itu sendiri
          find . -maxdepth 1 -type f -exec cp {} app/www/ \;
          
          # 4. Letakkan config.xml di folder utama aplikasi Cordova
          cp config.xml app/config.xml || true

      - name: Build APK
        run: |
          cd app
          cordova platform add android
          cordova plugin add cordova-plugin-local-notification
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WASender-APK
          path: app/platforms/android/app/build/outputs/apk/debug/*.apk
          
